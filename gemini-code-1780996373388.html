<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python ANSI Color Generator</title>
    <style>
        :root {
            --bg-color: #121218;
            --card-bg: #1e1e2e;
            --text-main: #cdd6f4;
            --text-muted: #a6adc8;
            --accent: #89b4fa;
            --term-bg: #11111b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            margin-top: 0;
            text-align: center;
            font-weight: 600;
            color: var(--accent);
        }

        .picker-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .picker-container label {
            font-weight: 500;
        }

        /* Styling the native color picker */
        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            background: transparent;
        }
        
        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid var(--text-muted);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
        }

        .slider-group {
            margin-bottom: 20px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 500;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            border-radius: 3px;
        }

        #r::-webkit-slider-runnable-track { background: linear-gradient(90deg, #441111, #ff4444); }
        #g::-webkit-slider-runnable-track { background: linear-gradient(90deg, #114411, #44ff44); }
        #b::-webkit-slider-runnable-track { background: linear-gradient(90deg, #111144, #4444ff); }

        .preview-box {
            background-color: var(--term-bg);
            border-radius: 8px;
            padding: 20px;
            margin: 25px 0;
            text-align: center;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .code-section {
            background-color: var(--term-bg);
            padding: 15px;
            border-radius: 8px;
            position: relative;
            margin-bottom: 15px;
        }

        .code-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        pre {
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #a6e3a1;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            color: var(--bg-color);
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .copy-btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Python Color Generator</h2>

        <div class="picker-container">
            <label for="color-wheel">Visual Color Picker:</label>
            <input type="color" id="color-wheel" value="#89B4FA">
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <span>Red</span>
                <span id="r-val">0</span>
            </div>
            <input type="range" id="r" min="0" max="255" value="137">
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <span>Green</span>
                <span id="g-val">0</span>
            </div>
            <input type="range" id="g" min="0" max="255" value="180">
        </div>

        <div class="slider-group">
            <div class="slider-header">
                <span>Blue</span>
                <span id="b-val">0</span>
            </div>
            <input type="range" id="b" min="0" max="255" value="250">
        </div>

        <div class="preview-box">
            > <span id="preview-text">System Online...</span>_
        </div>

        <div class="code-section">
            <div class="code-label">Variable Assignment</div>
            <button class="copy-btn" onclick="copyCode('var-code')">Copy</button>
            <pre id="var-code"></pre>
        </div>

        <div class="code-section">
            <div class="code-label">Print Example</div>
            <button class="copy-btn" onclick="copyCode('print-code')">Copy</button>
            <pre id="print-code"></pre>
        </div>
    </div>

    <script>
        const colorWheel = document.getElementById('color-wheel');
        const rInput = document.getElementById('r');
        const gInput = document.getElementById('g');
        const bInput = document.getElementById('b');
        
        const rVal = document.getElementById('r-val');
        const gVal = document.getElementById('g-val');
        const bVal = document.getElementById('b-val');
        
        const previewText = document.getElementById('preview-text');
        const varCode = document.getElementById('var-code');
        const printCode = document.getElementById('print-code');

        // Helper: Convert RGB to HEX to update the color wheel
        function rgbToHex(r, g, b) {
            return "#" + (1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1).toUpperCase();
        }

        // Helper: Convert HEX to RGB to update the sliders
        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        // Updates everything based on slider values
        function updateFromSliders() {
            const r = parseInt(rInput.value);
            const g = parseInt(gInput.value);
            const b = parseInt(bInput.value);

            // Sync color wheel
            colorWheel.value = rgbToHex(r, g, b);
            
            updateUI(r, g, b);
        }

        // Updates everything based on color wheel value
        function updateFromWheel() {
            const rgb = hexToRgb(colorWheel.value);
            
            // Sync sliders
            rInput.value = rgb.r;
            gInput.value = rgb.g;
            bInput.value = rgb.b;
            
            updateUI(rgb.r, rgb.g, rgb.b);
        }

        // Updates text, preview, and code snippets
        function updateUI(r, g, b) {
            // Update number labels
            rVal.textContent = r;
            gVal.textContent = g;
            bVal.textContent = b;

            // Update preview color
            previewText.style.color = `rgb(${r}, ${g}, ${b})`;
            previewText.style.textShadow = `0 0 10px rgba(${r}, ${g}, ${b}, 0.5)`;

            // Generate Python strings
            const ansiString = `\\033[38;2;${r};${g};${b}m`;
            
            varCode.textContent = `my_color = "${ansiString}"\nreset = "\\033[0m"`;
            printCode.textContent = `print(f"{my_color}Level Complete!{reset}")`;
        }

        function copyCode(elementId) {
            const textToCopy = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(textToCopy).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = "Copied!";
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 1500);
            });
        }

        // Add event listeners
        rInput.addEventListener('input', updateFromSliders);
        gInput.addEventListener('input', updateFromSliders);
        bInput.addEventListener('input', updateFromSliders);
        colorWheel.addEventListener('input', updateFromWheel);

        // Run once on load to set initial state
        updateFromSliders();
    </script>

</body>
</html>
